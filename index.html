<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>Polaris — try fullscreen</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  /* The pivot point: 48px from top, 96px from left */
  #anchor {
    position: fixed;
    top: 48px;
    left: 96px;
    width: 0;
    height: 0;
  }

  .layer {
    position: absolute;
    display: block;
    /* Each layer is centered on the anchor via top/left offset */
    transform-origin: center center;
  }

  #stars  { opacity: 0.25; }

  /* layers 3344×3344 → half = 1672 */
  #stars,
  #layer5,
  #layer4,
  #layer3,
  #layer2,
  #layer1 {
    width:  3344px;
    height: 3344px;
    top:  -1672px;
    left: -1672px;
  }

  /* constellations 4040×4040 → half = 2020 */
  #constellations {
    width:  4040px;
    height: 4040px;
    top:  -2020px;
    left: -2020px;
  }

  #stars          { animation: spin 7680s linear infinite; }
  #layer5         { animation: spin 4640s linear infinite; }
  #layer4         { animation: spin 3040s linear infinite; }
  #layer3         { animation: spin 1600s linear infinite; }
  #layer2         { animation: spin  1440s linear infinite; }
  #layer1         { animation: spin  960s linear infinite; }
  #constellations { animation: spin  480s linear infinite; }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
</style>
</head>
<body>

<div id="anchor">

  <img id="stars" class="layer" src="stars.jpg"
       onerror="this.style.display='none'">

  <img id="layer5" class="layer" src="layer5.svg">
  <img id="layer4" class="layer" src="layer4.svg">
  <img id="layer3" class="layer" src="layer3.svg">
  <img id="layer2" class="layer" src="layer2.svg">
  <img id="layer1" class="layer" src="layer1.svg">

  <img id="constellations" class="layer" src="constellations.svg">

</div>

</body>
</html>
